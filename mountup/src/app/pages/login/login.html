<div class="login-page">
  <app-site-header></app-site-header>

  <main class="login-main">
    <section class="login-card">
      <h1 class="login-title">Log In</h1>
      <p class="login-subtitle">
        Use your username and password to authenticate with the Django API.
      </p>

      <form class="login-form" (ngSubmit)="onSubmit()">
        <label class="login-field">
          <span class="login-field__label">Username</span>
          <input
            class="login-field__input"
            placeholder="username"
            type="text"
            name="username"
            [(ngModel)]="username"
          />
        </label>

        <label class="login-field">
          <span class="login-field__label">Password</span>
          <input
            class="login-field__input"
            placeholder="••••••••"
            type="password"
            name="password"
            [(ngModel)]="password"
          />
        </label>

        <button class="login-submit" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing in...' : 'Sign In' }}
        </button>

        @if (errorMessage) {
          <p class="login-error">{{ errorMessage }}</p>
        }
      </form>

      <p class="login-footer-note">
        No account yet?
        <a class="login-footer-note__link" routerLink="/register">Create one</a>
      </p>
    </section>
  </main>
</div>
