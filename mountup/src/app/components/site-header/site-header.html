<header class="site-header">
  <nav class="site-header__nav">
    <a class="site-header__brand" routerLink="/landing" (click)="closeMenu()">
      <span class="material-symbols-outlined site-header__brand-icon" data-icon="landscape"
        >landscape</span
      >
      <span class="site-header__brand-text">MOUNT UP</span>
    </a>

    <div class="site-header__links">
      <a
        class="site-header__link"
        [class.site-header__link--active]="isActive('home')"
        routerLink="/landing"
        (click)="closeMenu()"
        >HOME</a
      >
      <a
        class="site-header__link"
        [class.site-header__link--active]="isActive('guides')"
        routerLink="/catalog"
        (click)="closeMenu()"
        >GUIDES</a
      >
      <a
        class="site-header__link"
        [class.site-header__link--active]="isActive('about')"
        routerLink="/about"
        (click)="closeMenu()"
        >ABOUT US</a
      >
    </div>

    <div class="site-header__actions">
      @if (isAuthenticated) {
        <button class="site-header__account-btn" type="button" (click)="toggleMenu()">
          <span
            class="material-symbols-outlined site-header__account-icon"
            data-icon="account_circle"
            >account_circle</span
          >
          <span class="site-header__account-name">{{ displayName }}</span>
        </button>

        @if (isMenuOpen) {
          <div class="site-header__menu">
            <a class="site-header__menu-link" routerLink="/profile" (click)="closeMenu()"
              >My Profile</a
            >
            <button class="site-header__menu-logout" type="button" (click)="logout()">
              Logout
            </button>
          </div>
        }
      } @else {
        <a class="site-header__login-link" routerLink="/login">LOG IN</a>
        <a class="site-header__register-link" routerLink="/register">REGISTER</a>
      }
    </div>
  </nav>
</header>
