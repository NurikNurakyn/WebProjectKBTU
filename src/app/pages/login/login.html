<div class="bg-surface min-h-screen text-on-surface">
  <header class="fixed top-0 w-full z-50 bg-white/85 backdrop-blur-xl shadow-[0_12px_40px_rgba(22,40,57,0.06)]">
    <nav class="flex items-center justify-between px-6 h-20 max-w-7xl mx-auto">
      <a class="flex items-center gap-2" routerLink="/landing">
        <span class="material-symbols-outlined text-primary text-3xl" data-icon="landscape">landscape</span>
        <span class="text-2xl font-bold tracking-tighter text-slate-900 font-headline uppercase">MOUNT UP</span>
      </a>

      <div class="hidden md:flex items-center gap-8">
        <a class="text-slate-500 font-semibold text-sm hover:text-orange-600 transition-colors" routerLink="/landing">Home</a>
        <a class="text-slate-500 font-semibold text-sm hover:text-orange-600 transition-colors" routerLink="/catalog">Guide</a>
        <a class="text-slate-500 font-semibold text-sm hover:text-orange-600 transition-colors" routerLink="/leaderboard">Leaderboard</a>
        <a class="text-slate-500 font-semibold text-sm hover:text-orange-600 transition-colors" routerLink="/about">About Us</a>
      </div>

      <a class="px-4 py-2 rounded-lg bg-primary text-on-primary font-headline font-bold text-sm tracking-tight hover:brightness-110 transition-transform active:scale-95" routerLink="/register">Register</a>
    </nav>
  </header>

  <main class="pt-28 px-6 pb-16 max-w-md mx-auto">
    <section class="bg-surface-container-low rounded-2xl p-8 shadow-[0_12px_40px_rgba(22,40,57,0.06)]">
      <h1 class="text-3xl font-headline font-bold text-primary mb-2">Log In</h1>
      <p class="text-sm text-on-surface-variant mb-6">Frontend placeholder. Connect this form to backend auth later.</p>

      <form class="space-y-4">
        <label class="block">
          <span class="text-sm font-semibold text-on-surface">Email</span>
          <input class="mt-2 w-full rounded-lg border border-outline-variant/40 bg-white px-3 py-2" placeholder="you@example.com" type="email" />
        </label>

        <label class="block">
          <span class="text-sm font-semibold text-on-surface">Password</span>
          <input class="mt-2 w-full rounded-lg border border-outline-variant/40 bg-white px-3 py-2" placeholder="••••••••" type="password" />
        </label>

        <button class="w-full mt-2 px-4 py-2.5 rounded-lg bg-primary text-on-primary font-headline font-bold text-sm tracking-tight" type="button">
          Sign In
        </button>
      </form>

      <p class="text-sm text-on-surface-variant mt-5">
        No account yet?
        <a class="text-primary font-semibold hover:opacity-80 transition-opacity" routerLink="/register">Create one</a>
      </p>
    </section>
  </main>
</div>
